name: Snapchat Decompiler (v1.5.5)
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the APK'
        required: true

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Latest JADX (1.5.5)
        run: |
          wget https://github.com/skylot/jadx/releases/download/v1.5.5/jadx-1.5.5.zip
          unzip jadx-1.5.5.zip -d jadx
          
          # Fix Exit Code 126 by making the binary executable
          chmod +x jadx/bin/jadx
          
          echo "$GITHUB_WORKSPACE/jadx/bin" >> $GITHUB_PATH

      - name: Download APK
        run: |
          curl -L -o snapchat.apk "${{ github.event.inputs.apk_url }}"
          if [ ! -s snapchat.apk ]; then echo "Download failed"; exit 1; fi

      - name: Decompile Code
        run: |
          export JAVA_OPTS="-Xmx6G -XX:+UseG1GC"
          
          jadx -d out_folder snapchat.apk \
            --no-res \
            --no-imports \
            --show-bad-code \
            --log-level error

      - name: ZIP and Upload
        run: |
          zip -r source_code.zip out_folder/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapchat-java-source
          path: source_code.zip
