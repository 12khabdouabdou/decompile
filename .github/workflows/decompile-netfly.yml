name: Remote APK Decompiler
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the APK file'
        required: true
        default: 'https://example.com/app.apk'

jobs:
  decompile_remote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          echo "$GITHUB_WORKSPACE/jadx/bin" >> $GITHUB_PATH

      - name: Download APK
        run: |
          wget -O target_app.apk "${{ github.event.inputs.apk_url }}"
          if [ ! -f target_app.apk ]; then echo "Download failed!"; exit 1; fi

      - name: Decompile with Optimized Memory
        run: |
          # Snapchat is massive; use 6GB of the 7GB available on standard runners
          export JAVA_OPTS="-Xmx6G -XX:+UseG1GC"
          
          # Flags: 
          # --no-res: Skips resources (essential for massive apps like Snapchat to avoid OOM)
          # --no-imports: Reduces memory footprint by not trying to organize imports
          jadx -d decompiled_source target_app.apk --no-res --no-imports --log-level error

      - name: ZIP and Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-java-code
          path: decompiled_source/
