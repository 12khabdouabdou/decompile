name:  Decompiler Pro
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the Snapchat APK'
        required: true
        default: ''

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          # Downloading the latest stable version
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          echo "$GITHUB_WORKSPACE/jadx/bin" >> $GITHUB_PATH

      - name: Download APK
        run: |
          curl -L -o snapchat.apk "${{ github.event.inputs.apk_url }}"
          if [ ! -s snapchat.apk ]; then echo "Download failed or file is empty"; exit 1; fi

      - name: Decompile with Crash Fixes
        run: |
          # 6GB Heap + G1GC is the sweet spot for 7GB runners
          export JAVA_OPTS="-Xmx6G -XX:+UseG1GC"
          
          # FLAGS EXPLAINED:
          # --plugins-disable kotlin-metadata: Fixes the InconsistentKotlinMetadataException
          # --no-res: Prevents OOM by skipping heavy XML/Asset processing
          # --show-bad-code: Forces output even if decompilation is partial
          # --no-imports: Saves RAM by not trying to clean up Java imports
          
          jadx -d out_folder snapchat.apk \
            --plugins-disable kotlin-metadata \
            --no-res \
            --no-imports \
            --show-bad-code \
            --log-level error

      - name: ZIP Results
        run: zip -r decompiled_code.zip out_folder/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapchat-source-java
          path: decompiled_code.zip
