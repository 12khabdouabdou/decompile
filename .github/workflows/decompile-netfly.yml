name: Decompile Large APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          sudo apt-get update
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          echo "$GITHUB_WORKSPACE/jadx/bin" >> $GITHUB_PATH

      - name: Decompile APK
        run: |
          # Find the APK
          APK_FILE=$(find apks -name "*.apk" | head -n 1)
          echo "Decompiling $APK_FILE..."
          
          # Increase Java Heap Memory to 6GB (standard runner limit is ~7GB)
          export JAVA_OPTS="-Xmx6G -XX:+UseG1GC"
          
          # Run JADX with optimized flags:
          # --no-res: Skip resources (speeds up heavily packed apps)
          # --no-debug-info: Reduces memory footprint
          jadx -d out_folder "$APK_FILE" --no-res --no-debug-info --log-level error
          
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: decompiled-source
          path: out_folder/
