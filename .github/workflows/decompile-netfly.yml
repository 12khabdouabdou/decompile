name: Snapchat Decompiler Pro
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'Direct URL to the Snapchat APK'
        required: true
        default: ''

jobs:
  decompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install JADX
        run: |
          wget https://github.com/skylot/jadx/releases/download/v1.5.0/jadx-1.5.0.zip
          unzip jadx-1.5.0.zip -d jadx
          echo "$GITHUB_WORKSPACE/jadx/bin" >> $GITHUB_PATH

      - name: Download APK
        run: |
          curl -L -o snapchat.apk "${{ github.event.inputs.apk_url }}"
          if [ ! -s snapchat.apk ]; then echo "Download failed"; exit 1; fi

      - name: Decompile with Plugin Overrides
        run: |
          export JAVA_OPTS="-Xmx6G -XX:+UseG1GC"
          
          # JADX 1.5.0+ Plugin Syntax:
          # -Pkotlin-metadata.enabled=false (Explicitly turns off the crashing plugin)
          # We keep --no-res and --no-imports to ensure the 7GB RAM limit isn't hit.
          
          jadx -d out_folder snapchat.apk \
            -Pkotlin-metadata.enabled=false \
            --no-res \
            --no-imports \
            --show-bad-code \
            --log-level error

      - name: ZIP and Upload
        run: zip -r decompiled_code.zip out_folder/
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapchat-source
          path: decompiled_code.zip
